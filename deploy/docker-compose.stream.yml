# Override para stream mode: agrega nvmultistreamtiler al pipeline y sirve
# el frame tileado (con bboxes e inferencia) en http://<ip>:8080/viewer/all
# Usar con: docker compose -f docker-compose.yml -f docker-compose.stream.yml up -d
# O simplemente: ./stream.sh
services:
  deepstream:
    environment:
      NX_STREAM_ENABLED: "true"
