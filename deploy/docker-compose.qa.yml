# docker-compose.qa.yml — Override para QA Visual
# Usar SOLO con qa.sh  →  docker compose -f docker-compose.yml -f docker-compose.qa.yml up
# En producción nunca se carga este archivo.

services:

  deepstream:
    environment:
      NX_QA_ENABLED: "true"
      # Opcional: apuntar al staging para no contaminar el backend de producción
      # API_BASE_URL: https://staging.api.nxcomputing.ai
    volumes:
      - ./recordings:/nx_tech/recordings

  qa_app:
    build:
      context: .
      dockerfile: qa_app/Dockerfile.qa
    restart: "no"
    ports:
      - "8501:8501"
    volumes:
      - ./qa_app:/app          # hot-reload: cambios en qa_app/ no requieren rebuild
      - ./clients:/nx_tech/clients
      - ./recordings:/nx_tech/recordings
    environment:
      REDIS_HOST: redis
      MJPEG_PORT: "8080"
    depends_on:
      - redis
