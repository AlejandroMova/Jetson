services:

  # ── DeepStream inference pipeline ───────────────────────────────────────────
  deepstream:
    build:
      context: .
      dockerfile: Dockerfile.jetson
    runtime: nvidia
    privileged: true          # needed for Jetson hardware video encoder (nvv4l2h264enc)
    restart: unless-stopped
    ports:
      - "8554:8554"          # RTSP output — view with: vlc rtsp://<jetson-ip>:8554/ds-test
    volumes:
      - ./pipelines:/nx_tech/pipelines   # shared pipeline code
      - ./clients:/nx_tech/clients       # per-client configs (.env gitignored)
      - ./models:/nx_tech/models         # model files + TensorRT engines (rebuilt on first run)
      - ./tools:/nx_tech/tools             # DVR discovery + probe scripts
      - ./test_videos:/nx_tech/test_videos
      - /etc/nx_client:/etc/nx_client:ro   # written by setup.sh
      - /etc/nx_dvr_ip:/etc/nx_dvr_ip:ro  # written by setup.sh
    # devices:
    #   - /dev/v4l2-nvenc:/dev/v4l2-nvenc   # Jetson hardware H264 encoder (path varies by JetPack)
    working_dir: /nx_tech
    environment:
      PYTHONPATH: /nx_tech/pipelines
      # NX_CLIENT overrides /etc/nx_client — set this per deployment or leave commented
      # to read from /etc/nx_client (written by setup.sh --client <name>).
      # NX_CLIENT: demo
      # Device identity — sent with every event to the API
      CAMERA_ID: cam-001
      JETSON_ID: jetson-nx-001
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      API_KEY: ${API_KEY:-}
    # Production: reads DVR credentials from clients/<NX_CLIENT>/.env
    command: python3 pipelines/app.py
    # Testing with a local video file (no DVR required):
    # command: python3 pipelines/app_video_testing.py test_videos/sample.mp4

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nxcomputing
      POSTGRES_PASSWORD: nxcomputing_dev
      POSTGRES_DB: nxcomputing
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Cache ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
