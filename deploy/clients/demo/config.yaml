client_name: demo

# DVR connection
dvr_port: 554

# RTSP URL template — placeholders replaced at runtime by config_loader:
#   {user}      → DVR_USER from .env
#   {password}  → DVR_PASS from .env
#   {dvr_ip}    → DVR IP discovered by setup.sh (written to /etc/nx_dvr_ip)
#   {port}      → dvr_port above
#   {ch:02d}    → zero-padded channel number (01, 03, 05, ...)
#
# identify_dvr.py sets this automatically. Common variants by brand:
#
#   Brand                   Main stream                                      Sub-stream (stream_type: sub)
#   ─────────────────────── ──────────────────────────────────────────────── ──────────────────────────────────────────────────
#   Generic/QSee/Swann/Annke  .../ch{ch:02d}/main/av_stream                   .../ch{ch:02d}/sub/av_stream
#   Hikvision               .../Streaming/Channels/{ch:02d}01               .../Streaming/Channels/{ch:02d}02
#   Dahua/Amcrest/Lorex     .../cam/realmonitor?channel={ch}&subtype=0      .../cam/realmonitor?channel={ch}&subtype=1
#   Reolink                 .../h264Preview_{ch:02d}_main                   .../h264Preview_{ch:02d}_sub
#   Uniview/Unv             .../media/video{ch}                             .../unicast/c{ch}/s1/live  (firmware-dependent)
#   Generic h264            .../h264/ch{ch:02d}/main/av_stream              .../h264/ch{ch:02d}/sub/av_stream
#   Generic live            .../live/ch{ch:02d}                             .../live/ch{ch:02d}_1
#   Axis / Hanwha-Samsung   Sub-stream path is device-specific — set manually after checking DVR web UI.
rtsp_url_pattern: "rtsp://{user}:{password}@{dvr_ip}:{port}/ch{ch:02d}/main/av_stream"

# Active camera channels (DVR channel numbers, 1-indexed)
channels: [1]

# Pipeline capabilities — default for this client.
# The active pipeline is resolved in this order (highest priority first):
#   1. NX_PIPELINE env var  (e.g. docker compose run -e NX_PIPELINE=people_counting,age_gender)
#   2. /etc/nx_pipeline     (written by setup.sh --package, recommended for production)
#   3. This field           (fallback default)
#
# Available capabilities:
#   people_counting  — Always active. PeopleNet PGIE + tracker. No extra model needed.
#   age_gender       — ResNet-18 SGIE: gender + age group per detected person.
#                      Required by: Comercio Total / Enterprise
#   epp_detection    — SGIE: PPE compliance (helmet, vest). Model not yet integrated.
#                      Required by: Industrial Avanzado / Total / Enterprise
#   fire_smoke       — Frame classifier: fire & smoke detection. Model not yet integrated.
#                      Required by: Industrial Total / Enterprise, Hogar Total
#   license_plate    — LPD + LPR: read vehicle plates. Model not yet integrated.
#                      Required by: Industrial Total / Enterprise
#   fall_detection   — Pose-based fall events. Model not yet integrated.
#                      Required by: Hogar Avanzado / Total
#
# Package → capability mapping (set automatically by setup.sh --package):
#   comercio_basico      → people_counting
#   comercio_avanzado    → people_counting
#   comercio_total       → people_counting,age_gender
#   industrial_basico    → people_counting
#   industrial_avanzado  → people_counting,epp_detection
#   industrial_total     → people_counting,epp_detection,license_plate,fire_smoke
#   hogar_basico         → people_counting
#   hogar_avanzado       → people_counting,fall_detection
#   hogar_total          → people_counting,fall_detection,fire_smoke
pipeline:
  - people_counting

# Stream type — which RTSP stream the Jetson pulls from the DVR.
#
#   main — Full-resolution main stream (1920×1080). Default.
#          Use for ≤6 cameras on a single Jetson Orin Nano.
#
#   sub  — DVR sub-stream (960×544). Required for 16-camera deployments.
#          Run: setup.sh --stream-type sub  OR  identify_dvr.py --stream-type sub --update-config
#          This sets rtsp_url_pattern to the correct sub-stream path automatically.
#          For Axis and Hanwha/Samsung the path is device-specific — set manually.
#
#          Accuracy impact: PeopleNet natively targets 960×544 — zero detection loss.
#          SGIEs (age/gender, face) see smaller crops; people far from camera may be
#          skipped by minimum-size filters (same as they would be at long range anyway).
#
# stream_width / stream_height override the resolution set by stream_type if specified.
stream_type: main

# Tracker algorithm:
#   nvdcf — NvDCF correlation filter. More precise tracking through occlusions.
#            Stable up to ~6 streams on Jetson Orin Nano. Use for clients with few cameras.
#   iou   — IoU matching. Simpler, no CUDA kernels. Stable with 16 streams.
#            Loses track ID on crossing/occlusion but sufficient for people counting.
tracker: nvdcf

# Sector — vertical del cliente. Inferido de --package en setup.sh; se puede sobrescribir aquí.
#   comercio   — tiendas, supermercados, centros comerciales
#   industrial — fábricas, bodegas, plantas
#   hogar      — hogares, departamentos
sector: comercio

# Cámaras de entrada/salida (subconjunto de channels).
# Usado para calcular tiempo en tienda y conteo de visitas.
# Dejar vacío si ninguna cámara cubre directamente la puerta de entrada.
entry_exit_channels: []
