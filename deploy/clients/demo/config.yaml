# ═══════════════════════════════════════════════════════════════════════════
#  Config del cliente. Editable a mano; setup.sh completa lo básico solo.
#  Los campos comentados (# campo: valor) son opcionales — descoméntalos para usarlos.
# ═══════════════════════════════════════════════════════════════════════════

# Nombre del cliente. Solo referencia visual — el sistema lo lee de /etc/nx_client.
client_name: demo

# Puerto RTSP del DVR (554 en casi todos).
dvr_port: 554

# Plantilla de la URL RTSP. setup.sh la llena solo con identify_dvr.py.
# Placeholders: {user} {password} {dvr_ip} {port} y {ch:02d} (canal, ej. 01, 03).
#
# La ruta cambia según la marca del DVR. Las más comunes:
#   Genérico/QSee/Swann   /ch{ch:02d}/main/av_stream
#   Hikvision             /Streaming/Channels/{ch:02d}01
#   Dahua/Amcrest/Lorex   /cam/realmonitor?channel={ch}&subtype=0
#   Reolink               /h264Preview_{ch:02d}_main
# (Axis y Hanwha/Samsung: revisar la web del DVR y poner la ruta a mano.)
rtsp_url_pattern: "rtsp://{user}:{password}@{dvr_ip}:{port}/ch{ch:02d}/main/av_stream"

# Canales de cámara activos (números del DVR, empiezan en 1).
channels: [1]

# Paquete contratado. Define qué analiza el sistema. setup.sh --package lo pone.
#   comercio_basico / avanzado   → conteo de personas (avanzado suma edad/género)
#   comercio_total / enterprise  → + reconocimiento facial de empleados
#   industrial_basico / avanzado → conteo de personas
#   industrial_total / enterprise→ + reconocimiento facial
#   hogar_basico                 → conteo de personas
#   hogar_avanzado / total       → + reconocimiento facial
#   manual                       → usa los campos pipeline/sector de abajo (pruebas)
package: comercio_basico

# Solo si package: manual
# pipeline:
#   - people_counting
#   - age_gender
# sector: comercio

# Calidad del stream que se pide al DVR:
#   main → alta resolución (1920×1080). Para hasta 6 cámaras por Jetson.
#   sub  → baja resolución (960×544). Necesario para 16 cámaras.
#          Poner con: setup.sh --stream-type sub  (ajusta la URL solo).
# stream_type: main
stream_type: main

# Forzar resolución exacta (opcional, solo si el DVR usa una rara).
# stream_width: 1280
# stream_height: 720

# Algoritmo de seguimiento de personas:
#   nvdcf   → preciso. Recomendado hasta 6 cámaras. (Default)
#   iou     → ligero. Estable hasta 16 cámaras, pero pierde más el rastro.
# Avanzados (dejar nvdcf salvo que sepas por qué cambiarlo):
#   nvdcf_extended_shadow → nvdcf con más tolerancia a que alguien quede tapado un momento.
#   nvdcf_reid            → nvdcf + recupera mejor el rastro; requiere descargar un modelo extra.
#   nvdcf_accuracy        → perfil de máxima precisión de NVIDIA; necesita un modelo que aún
#                           no se descarga, así que hoy no arranca. No usar todavía.
tracker: nvdcf

# Cámaras que apuntan a la entrada/salida (subconjunto de channels).
# Sirven para medir tiempo en tienda y visitas. Vacío si ninguna da a la puerta.
entry_exit_channels: []

# Cámaras externas (fachada, estacionamiento). Las no listadas se tratan como internas.
external_channels: []

# Activar/desactivar el conteo por tipo de cámara.
# false → esas cámaras no analizan ni envían datos.
count_internal: true
count_external: true

# ── Ajustes finos de detección (opcionales) ──────────────────────────────────
# Todo lo de abajo es opcional. El sistema funciona sin tocarlo.

# Cada cuántos frames detecta personas (los intermedios los cubre el tracker).
# Menor = más preciso, más carga. Guía: 2 para pocas cámaras, 4 para muchas.
pgie_interval: 2

# Frames por lote de inferencia. 0 = valor por defecto del sistema. Dejar en 0.
# pgie_batch_size: 0

# Umbrales de detección de personas. Dejarlos comentados usa los valores por defecto.
#   nms_iou: 0.25 (multitudes) a 0.4 (normal) — baja si dos personas juntas se ven como una.
#   pre_cluster: 0.2 (más detecciones) a 0.35 (más limpio) — baja para captar gente lejana.
#   topk: máximo de personas por frame. Sube si en escenas llenas deja de detectar.
# pgie_nms_iou_threshold: 0.3
# pgie_pre_cluster_threshold: 0.25
# pgie_topk: 20

# Cada cuántos frames corren los clasificadores (edad/género, etc.).
# Mayor = menos carga. -1 = por defecto.
# sgie_interval: -1

# Reconocimiento de la misma persona entre cámaras:
#   reid_gallery_size → cuántas fotos guarda por persona. Default 10.
#                       Baja a 5 si hay mucha gente; sube a 15 si falla con luz cambiante.
#   osnet_precision   → fp32 (default, preciso) o fp16 (más rápido, dejar fp32).
# reid_gallery_size: 10
# osnet_precision: fp32

# Grabar clips MP4 cuando se detectan personas. Se guardan en /nx_tech/recordings/
# y se borran solos al superar 10 GB. Default: apagado.
# recording_enabled: false
